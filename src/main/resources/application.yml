spring:
  application:
    name: replai-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/replai-postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_brevo_account_email}
    password: ${MAIL_PASSWORD:your_brevo_smtp_key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${PORT:8080}

app:
  domain: ${APP_DOMAIN:http://localhost:8080}
  storage:
    local-path: ${STORAGE_LOCAL_PATH:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:80,http://localhost}

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    mock: ${AI_SERVICE_MOCK:false}
    internal-key: ${AI_SERVICE_INTERNAL_KEY:}
