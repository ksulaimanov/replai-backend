spring:
  application:
    name: replai-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/botflow}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

ai:
  service:
    mock: ${AI_SERVICE_MOCK:true}
