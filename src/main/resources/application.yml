spring:
  application:
    name: replai-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/botflow}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_brevo_account_email}
    password: ${MAIL_PASSWORD:your_brevo_smtp_key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    mock: ${AI_SERVICE_MOCK:true}
